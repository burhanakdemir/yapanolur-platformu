# Bu repo kökü doğrudan `ilan` klasörüyse kullanılır.
# Monorepo (ör. yapanolur/Web Tasarım/ilan): kökteki `.github/workflows/ilan-platformu-ci.yml` geçerlidir.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ilan_ci
  AUTH_SECRET: ci-auth-secret-placeholder-min-32-chars-long-ok
  OTP_PEPPER: ci-otp-pepper-placeholder-min-24-ok
  APP_URL: http://127.0.0.1:3000

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ilan_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ilan_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate (PostgreSQL)
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Auth guard tests
        run: npm run test:auth-guards

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
